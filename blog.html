<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog | Creator Support Amravati</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">

<style>
body{
font-family:'Inter',sans-serif;
margin:0;
background:#f5f5f5;
}

/* HEADER */
header{
background:#000;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 5%;
}

.logo{
font-size:22px;
font-weight:700;
}

.logo span{
color:#ffd600;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:600;
}

/* LAYOUT */
.container{
display:flex;
gap:20px;
padding:40px 5%;
}

.left{
flex:3;
}

.right{
flex:1;
}

/* CARD */
.card{
background:#fff;
border-radius:10px;
padding:15px;
margin-bottom:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
display:flex;
gap:15px;
}

.card img{
width:120px;
height:80px;
object-fit:cover;
border-radius:8px;
}

.card h3{
margin:0;
}

.card p{
font-size:14px;
color:#666;
}

.read-btn{
display:inline-block;
margin-top:8px;
padding:6px 12px;
background:#000;
color:#fff;
text-decoration:none;
border-radius:5px;
font-size:12px;
}

/* BUTTONS */
.card-actions{
margin-top:8px;
}

.card-actions button{
padding:5px 10px;
border:none;
background:#000;
color:#fff;
cursor:pointer;
border-radius:5px;
margin-right:5px;
}

/* SIDEBAR */
.sidebar{
background:#fff;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* FOOTER */
footer{
background:#000;
color:#fff;
text-align:center;
padding:20px;
margin-top:30px;
}

/* MOBILE */
@media(max-width:768px){
.container{
flex-direction:column;
}
}
</style>

</head>

<body>

<header>
<div class="logo">Creator Support <span>Amravati</span></div>

<nav>
<a href="../index.html">Home</a>
<a href="../about.html">About</a>
<a href="../services.html">Services</a>
<a href="../portfolio.html">Portfolio</a>
<a href="../blog.html">Blog</a>
<a href="../contact.html">Contact</a>
</nav>
</header>

<div class="container">

<!-- LEFT SIDE -->
<div class="left">

<!-- STATIC CARD -->
<div class="card">
<img src="images/youtube-growth.jpg">
<div>
<h3>How to Grow a YouTube Channel</h3>
<p>Learn powerful strategies to grow from 0 subscribers.</p>
<a href="blog/blog1.html" class="read-btn">Read More</a>

<div class="card-actions">
<button onclick="likePost('post1')">👍 <span id="post1">0</span></button>
<button onclick="sharePost()">📤</button>
</div>

</div>
</div>

</div>

<!-- RIGHT SIDEBAR -->
<div class="right">

<div class="sidebar">
<h3>Latest Posts</h3>
<p>New posts will appear here</p>
</div>

</div>

</div>

<footer>
<p>© 2026 Creator Support Amravati</p>
</footer>

<!-- MAIN JS -->
<script src="assets/js/main.js"></script>

<!-- ADMIN POSTS AUTO LOAD -->
<script>
let posts = JSON.parse(localStorage.getItem("blogPosts")) || [];

let blogContainer = document.querySelector(".left");

posts.forEach((p,i)=>{
blogContainer.innerHTML += `
<div class="card">
<img src="${p.image}">
<div>
<h3>${p.title}</h3>
<p>${p.content.substring(0,80)}...</p>
</div>
</div>
`;
});
</script>

</body>
</html>
