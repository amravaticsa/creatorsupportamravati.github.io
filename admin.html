<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
}

.post{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>🛠 Admin Panel</h2>

<input type="text" id="title" placeholder="Post Title">

<input type="text" id="image" placeholder="Image URL">

<textarea id="content" placeholder="Post Content"></textarea>

<button onclick="addPost()">Add Post</button>

<h3>All Posts</h3>

<div id="posts"></div>

</div>

<script>

let posts = JSON.parse(localStorage.getItem("blogPosts")) || [];

function addPost(){
let title = document.getElementById("title").value;
let image = document.getElementById("image").value;
let content = document.getElementById("content").value;

let post = {title,image,content};

posts.push(post);
localStorage.setItem("blogPosts", JSON.stringify(posts));

loadPosts();
}

function loadPosts(){
let container = document.getElementById("posts");
container.innerHTML = "";

posts.forEach((p,i)=>{
container.innerHTML += `
<div class="post">
<b>${p.title}</b>
<p>${p.content.substring(0,50)}...</p>
</div>
`;
});
}

loadPosts();

</script>

</body>
</html>
