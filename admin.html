<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
}

.post{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:5px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
<h2>Admin Login</h2>
<input type="password" id="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
</div>

<!-- 🔥 ADMIN PANEL -->
<div id="adminPanel" style="display:none;">

<div class="container">

<h2>🛠 Admin Panel</h2>

<input type="text" id="title" placeholder="Post Title">
<input type="text" id="image" placeholder="Image URL">
<textarea id="content" placeholder="Post Content"></textarea>

<button onclick="addPost()">Add Post</button>

<h3>All Posts</h3>
<div id="posts"></div>

</div>

</div>

<script>
  // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDHmtgU34qEhXPME4SpF54BWVHl8V5t34o",
  authDomain: "csa-blog.firebaseapp.com",
  projectId: "csa-blog",
  storageBucket: "csa-blog.firebasestorage.app",
  messagingSenderId: "125350824053",
  appId: "1:125350824053:web:542312904b868bb6b7d03c",
  measurementId: "G-GH1CK19JZQ"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

// 🔐 LOGIN FUNCTION
function login(){
let pass = document.getElementById("password").value;

if(pass === "admin123"){
document.getElementById("loginBox").style.display="none";
document.getElementById("adminPanel").style.display="block";
}else{
alert("Wrong Password");
}
}

// 📦 DATA LOAD
let posts = JSON.parse(localStorage.getItem("blogPosts")) || [];

// ➕ ADD POST
function addPost(){
let title = document.getElementById("title").value;
let image = document.getElementById("image").value;
let content = document.getElementById("content").value;

posts.push({title,image,content});
localStorage.setItem("blogPosts", JSON.stringify(posts));

loadPosts();
}

// 🔄 LOAD POSTS
function loadPosts(){
let container = document.getElementById("posts");
container.innerHTML = "";

posts.forEach((p,i)=>{
container.innerHTML += `
<div class="post">
<b>${p.title}</b>
<p>${p.content.substring(0,50)}...</p>

<button onclick="editPost(${i})">✏ Edit</button>
<button onclick="deletePost(${i})">🗑 Delete</button>

</div>
`;
});
}

// ✏ EDIT
function editPost(i){
let newTitle = prompt("Edit Title", posts[i].title);
let newContent = prompt("Edit Content", posts[i].content);

if(newTitle && newContent){
posts[i].title = newTitle;
posts[i].content = newContent;

localStorage.setItem("blogPosts", JSON.stringify(posts));
loadPosts();
}
}

// 🗑 DELETE
function deletePost(i){
if(confirm("Delete this post?")){
posts.splice(i,1);
localStorage.setItem("blogPosts", JSON.stringify(posts));
loadPosts();
}
}

// INIT
loadPosts();

</script>

</body>
</html>
