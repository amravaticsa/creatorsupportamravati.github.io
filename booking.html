<style>
body{
  font-family:'Inter',sans-serif;
  margin:0;
  color:#333;
  background:#fafafa;
}

header{
  background:#000;
  color:#fff;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  padding:15px 5%;
}

.logo{
  font-size:22px;
  font-weight:700;
}

.logo span{
  color:#ffd600;
}

nav{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

nav a{
  color:white;
  text-decoration:none;
  font-weight:600;
  transition: color 0.3s ease;
}

nav a:hover{
  color:#ffd600;
}

.page{
  padding:60px 5%;
  max-width:800px;
  margin:auto;
  line-height:1.7;
}

.page h1{
  color:#000;
  margin-bottom:40px;
  text-align:center;
}

form{
  background:#fff;
  padding:30px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

form label{
  display:block;
  margin-bottom:8px;
  font-weight:600;
}

form input, form select, form textarea{
  width:100%;
  padding:10px 12px;
  margin-bottom:20px;
  border:1px solid #ccc;
  border-radius:5px;
  font-size:16px;
  font-family:'Inter',sans-serif;
}

form button{
  background:#000;
  color:#ffd600;
  font-weight:600;
  padding:12px 20px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-size:16px;
  transition: background 0.3s ease;
}

form button:hover{
  background:#333;
}

footer{
  background:black;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:60px;
}

footer a{
  color:#ffd600;
  text-decoration:none;
  margin:0 5px;
}

footer a:hover{
  text-decoration:underline;
}

@media screen and (max-width:768px){
  header{
    flex-direction:column;
    align-items:flex-start;
  }
  nav{
    width:100%;
    flex-direction:column;
    gap:10px;
    margin-top:10px;
  }
}
</style>
</head>

<body>

<header>
<div class="logo">Creator Support <span>Amravati</span></div>
<nav>

<section class="page">
<h1>Book a Service</h1>

<form action="https://forms.gle/Mdh6X2a7yJn4JabCA" method="get" target="_blank">
  <label for="name">Full Name</label>
  <input type="text" id="name" name="name" placeholder="Enter your name" required>

  <label for="email">Email</label>
  <input type="email" id="email" name="email" placeholder="Enter your email" required>

  <label for="phone">Phone</label>
  <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

  <label for="service">Select Service</label>
  <select id="service" name="service" required>
    <option value="">--Choose a Service--</option>
    <option value="digital_marketing">Digital Marketing</option>
    <option value="website_development">Website Development</option>
    <option value="graphic_design">Graphic Design</option>
    <option value="social_media">Social Media Management</option>
    <option value="advertising">Advertising Services</option>
    <option value="video_production">Video Production</option>
    <option value="photography">Photography Services</option>
    <option value="content_creation">Content Creation</option>
    <option value="branding">Branding & Identity Development</option>
    <option value="creator_support">Creator Support & Consulting</option>
    <option value="ecommerce">E-Commerce Solutions</option>
    <option value="podcast">Podcast & Audio Production</option>
    <option value="live_stream">Live Streaming Services</option>
    <option value="motion_graphics">Motion Graphics & Animation</option>
    <option value="influencer">Influencer & Collaboration Campaigns</option>
    <option value="seo">Search Engine Optimization (SEO)</option>
    <option value="email_crm">Email & CRM Marketing</option>
    <option value="event_coverage">Event Coverage & Promotions</option>
    <option value="training">Training & Workshops</option>
    <option value="analytics">Analytics & Performance Reporting</option>
    <option value="creative_direction">Creative Direction & Scriptwriting</option>
    <option value="product_photography">Product Photography & Demo Videos</option>
    <option value="reputation">Reputation Management</option>
    <option value="local_promo">Local Business Promotion</option>
    <option value="premium_content">Premium Content Packages</option>
  </select>

  <label for="date">Preferred Date</label>
  <input type="date" id="date" name="date" required>

  <label for="time">Preferred Time</label>
  <input type="time" id="time" name="time" required>

  <label for="message">Additional Details</label>
  <textarea id="message" name="message" rows="5" placeholder="Any special requests or details..."></textarea>

  <button type="submit">Book Now</button>
</form>
</section>
